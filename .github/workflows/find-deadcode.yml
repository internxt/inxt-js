name: Find deadcode

on:
  push:

jobs:
  find_deadcode:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: yarn

      - name: Install dependencies
        run: yarn

      - name: Find deadcode
        run: yarn find-deadcode
